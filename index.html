<style>
  :root {
      /* Type scale */
          --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
              --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
                  --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
                      --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
                          --text-2xl: clamp(2rem, 1.2rem + 2.5vw, 3.5rem);
                              --text-hero: clamp(3rem, 0.5rem + 7vw, 8rem);

                                  /* Spacing */
                                      --space-2: 0.5rem;
                                          --space-3: 0.75rem;
                                              --space-4: 1rem;
                                                  --space-6: 1.5rem;
                                                      --space-8: 2rem;
                                                          --space-12: 3rem;
                                                              --space-16: 4rem;

                                                                  /* Pink Swan palette — dusk-rose dusk over deep plum water */
                                                                      --color-bg: #1a1018;
                                                                          --color-bg-2: #241423;
                                                                              --color-ink: #f7e8ef;
                                                                                  --color-ink-muted: #c9a9bc;
                                                                                      --color-ink-faint: #8d6c80;
                                                                                          --rose: #e98ab5;
                                                                                              --rose-soft: #f4b8d2;
                                                                                                  --rose-deep: #c25a8a;
                                                                                                      --blush: #ffd9e8;
                                                                                                          --gold: #f0c987;

                                                                                                              --radius-full: 9999px;
                                                                                                                  --transition: 220ms cubic-bezier(0.16, 1, 0.3, 1);
                                                                                                                      --font-display: 'Cormorant Garamond', Georgia, serif;
                                                                                                                          --font-body: 'Manrope', -apple-system, sans-serif;
                                                                                                                            }

                                                                                                                              /* Light mode — soft blush dawn */
                                                                                                                                [data-theme='light'] {
                                                                                                                                    --color-bg: #fbeef4;
                                                                                                                                        --color-bg-2: #f6dde9;
                                                                                                                                            --color-ink: #3a1f30;
                                                                                                                                                --color-ink-muted: #7a4f66;
                                                                                                                                                    --color-ink-faint: #b18ca0;
                                                                                                                                                        --rose: #d96aa0;
                                                                                                                                                            --rose-soft: #ec8fbb;
                                                                                                                                                                --rose-deep: #b24a7e;
                                                                                                                                                                    --blush: #f7c5dc;
                                                                                                                                                                        --gold: #c9963f;
                                                                                                                                                                          }

                                                                                                                                                                            *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

                                                                                                                                                                              html {
                                                                                                                                                                                  -webkit-font-smoothing: antialiased;
                                                                                                                                                                                      -moz-osx-font-smoothing: grayscale;
                                                                                                                                                                                          text-rendering: optimizeLegibility;
                                                                                                                                                                                            }

                                                                                                                                                                                              body {
                                                                                                                                                                                                  min-height: 100dvh;
                                                                                                                                                                                                      font-family: var(--font-body);
                                                                                                                                                                                                          font-size: var(--text-base);
                                                                                                                                                                                                              font-weight: 300;
                                                                                                                                                                                                                  line-height: 1.6;
                                                                                                                                                                                                                      color: var(--color-ink);
                                                                                                                                                                                                                          background: var(--color-bg);
                                                                                                                                                                                                                              overflow-x: hidden;
                                                                                                                                                                                                                                  position: relative;
                                                                                                                                                                                                                                      transition: background var(--transition), color var(--transition);
                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                          svg { display: block; max-width: 100%; height: auto; }

                                                                                                                                                                                                                                            ::selection { background: color-mix(in oklab, var(--rose) 35%, transparent); }

                                                                                                                                                                                                                                              /* Ambient gradient glow behind everything */
                                                                                                                                                                                                                                                body::before {
                                                                                                                                                                                                                                                    content: '';
                                                                                                                                                                                                                                                        position: fixed;
                                                                                                                                                                                                                                                            inset: -20%;
                                                                                                                                                                                                                                                                background:
                                                                                                                                                                                                                                                                      radial-gradient(60% 50% at 50% 18%, color-mix(in oklab, var(--rose) 28%, transparent), transparent 70%),
                                                                                                                                                                                                                                                                            radial-gradient(70% 60% at 50% 100%, color-mix(in oklab, var(--rose-deep) 22%, transparent), transparent 65%),
                                                                                                                                                                                                                                                                                  linear-gradient(180deg, var(--color-bg), var(--color-bg-2));
                                                                                                                                                                                                                                                                                      z-index: -2;
                                                                                                                                                                                                                                                                                          animation: glow 14s ease-in-out infinite alternate;
                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                              @keyframes glow {
                                                                                                                                                                                                                                                                                                  from { transform: translateY(-1.5%) scale(1); opacity: 0.92; }
                                                                                                                                                                                                                                                                                                      to   { transform: translateY(1.5%) scale(1.04); opacity: 1; }
                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                          /* Drifting feather particles */
                                                                                                                                                                                                                                                                                                            .feathers { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; }
                                                                                                                                                                                                                                                                                                              .feather {
                                                                                                                                                                                                                                                                                                                  position: absolute;
                                                                                                                                                                                                                                                                                                                      top: -8%;
                                                                                                                                                                                                                                                                                                                          width: 14px; height: 22px;
                                                                                                                                                                                                                                                                                                                              border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
                                                                                                                                                                                                                                                                                                                                  background: linear-gradient(160deg, var(--blush), color-mix(in oklab, var(--rose) 60%, transparent));
                                                                                                                                                                                                                                                                                                                                      opacity: 0;
                                                                                                                                                                                                                                                                                                                                          filter: blur(0.3px);
                                                                                                                                                                                                                                                                                                                                              animation: fall linear infinite;
                                                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                                                  @keyframes fall {
                                                                                                                                                                                                                                                                                                                                                      0%   { transform: translateY(-10vh) translateX(0) rotate(0deg); opacity: 0; }
                                                                                                                                                                                                                                                                                                                                                          10%  { opacity: 0.7; }
                                                                                                                                                                                                                                                                                                                                                              90%  { opacity: 0.5; }
                                                                                                                                                                                                                                                                                                                                                                  100% { transform: translateY(112vh) translateX(40px) rotate(220deg); opacity: 0; }
                                                                                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                                                                                                      /* Header */
                                                                                                                                                                                                                                                                                                                                                                        header {
                                                                                                                                                                                                                                                                                                                                                                            position: relative;
                                                                                                                                                                                                                                                                                                                                                                                z-index: 2;
                                                                                                                                                                                                                                                                                                                                                                                    display: flex;
                                                                                                                                                                                                                                                                                                                                                                                        align-items: center;
                                                                                                                                                                                                                                                                                                                                                                                            justify-content: space-between;
                                                                                                                                                                                                                                                                                                                                                                                                padding: var(--space-6) clamp(var(--space-4), 5vw, var(--space-16));
                                                                                                                                                                                                                                                                                                                                                                                                  }
                                                                                                                                                                                                                                                                                                                                                                                                    .wordmark {
                                                                                                                                                                                                                                                                                                                                                                                                        display: flex; align-items: center; gap: var(--space-3);
                                                                                                                                                                                                                                                                                                                                                                                                            font-family: var(--font-display);
                                                                                                                                                                                                                                                                                                                                                                                                                font-size: var(--text-lg);
                                                                                                                                                                                                                                                                                                                                                                                                                    font-weight: 500;
                                                                                                                                                                                                                                                                                                                                                                                                                        letter-spacing: 0.02em;
                                                                                                                                                                                                                                                                                                                                                                                                                            color: var(--color-ink);
                                                                                                                                                                                                                                                                                                                                                                                                                              }
                                                                                                                                                                                                                                                                                                                                                                                                                                .wordmark svg { width: 30px; height: 30px; color: var(--rose); }

                                                                                                                                                                                                                                                                                                                                                                                                                                  .site-nav {     display: flex;     gap: 1.5rem;     align-items: center;   }    .nav-link {     font-family: var(--font-body);     font-size: 0.75rem;     font-weight: 500;     letter-spacing: 0.08em;     text-transform: uppercase;     color: var(--color-ink-muted);     text-decoration: none;     transition: color var(--transition);   }    .nav-link:hover,   .nav-link[aria-current] {     color: var(--rose);   }    .theme-toggle {
                                                                                                                                                                                                                                                                                                                                                                                                                                      width: 40px; height: 40px;
                                                                                                                                                                                                                                                                                                                                                                                                                                          display: grid; place-items: center;
                                                                                                                                                                                                                                                                                                                                                                                                                                              border: 1px solid color-mix(in oklab, var(--rose) 35%, transparent);
                                                                                                                                                                                                                                                                                                                                                                                                                                                  border-radius: var(--radius-full);
                                                                                                                                                                                                                                                                                                                                                                                                                                                      background: color-mix(in oklab, var(--rose) 8%, transparent);
                                                                                                                                                                                                                                                                                                                                                                                                                                                          color: var(--color-ink-muted);
                                                                                                                                                                                                                                                                                                                                                                                                                                                              cursor: pointer;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                  transition: color var(--transition), background var(--transition), border-color var(--transition), transform var(--transition);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                      .theme-toggle:hover { color: var(--rose); border-color: var(--rose); transform: translateY(-1px); }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        .theme-toggle:focus-visible { outline: 2px solid var(--rose); outline-offset: 3px; }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                          /* Hero */
                                                                                                                                                                                                                                                                                                                                                                                                                                                                            main {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                position: relative;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    z-index: 1;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        display: flex;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            flex-direction: column;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                align-items: center;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    text-align: center;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        padding: clamp(var(--space-4), 2vh, var(--space-8)) var(--space-4) var(--space-12);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            min-height: calc(100dvh - 84px);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                justify-content: center;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    /* Swan illustration */
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      .swan-stage {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          position: relative;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              width: min(410px, 76vw);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  margin-bottom: var(--space-6);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      animation: rise 1.6s cubic-bezier(0.16, 1, 0.3, 1) both;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          @keyframes rise {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              from { opacity: 0; transform: translateY(28px) scale(0.96); }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  to   { opacity: 1; transform: translateY(0) scale(1); }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      .swan-glide { animation: glide 7.5s ease-in-out infinite; transform-origin: 50% 70%; }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        @keyframes glide {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            0%, 100% { transform: translateY(0) rotate(0deg); }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                50%      { transform: translateY(-8px) rotate(-0.8deg); }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    .wing { transform-origin: 154px 143px; animation: flutter 6s ease-in-out infinite; }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      @keyframes flutter {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          0%, 100% { transform: rotate(0deg); }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              50%      { transform: rotate(-2.4deg); }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  /* Copy */
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    .eyebrow {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        font-size: var(--text-xs);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            letter-spacing: 0.42em;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                text-transform: uppercase;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    font-weight: 500;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        color: var(--rose);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            margin-bottom: var(--space-4);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                animation: fadeUp 1s 0.3s both;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    h1 {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        font-family: var(--font-display);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            font-weight: 500;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                font-size: var(--text-hero);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    line-height: 0.95;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        letter-spacing: -0.01em;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            color: var(--color-ink);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                text-wrap: balance;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    animation: fadeUp 1s 0.45s both;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        h1 .accent {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            font-style: italic;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                background: linear-gradient(120deg, var(--rose-soft), var(--rose), var(--rose-deep));
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    -webkit-background-clip: text; background-clip: text;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        -webkit-text-fill-color: transparent; color: transparent;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            .tagline {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                margin-top: var(--space-6);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    max-width: 32ch;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        font-size: var(--text-lg);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            font-weight: 300;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                color: var(--color-ink-muted);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    text-wrap: balance;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        animation: fadeUp 1s 0.6s both;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            .rule {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                width: 64px; height: 1px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    margin: var(--space-8) 0 var(--space-6);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        background: linear-gradient(90deg, transparent, var(--rose), transparent);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            animation: fadeUp 1s 0.7s both;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              }
